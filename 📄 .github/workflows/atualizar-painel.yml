name: Atualizar painel cartão Bacen

on:
  schedule:
    # toda segunda às 09:00 BRT (12:00 UTC) - dados mensais/trimestrais não mudam todo dia
    - cron: "0 12 * * 1"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão no GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline e gerar data.json
        run: python scripts/generate_data_json.py

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs