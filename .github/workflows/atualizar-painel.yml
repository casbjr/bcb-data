name: Atualizar painel cartão Bacen

on:
  schedule:
    - cron: '0 12 * * 1'   # toda segunda, 12:00 UTC (09:00 BRT)
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write           # necessário pra o Actions poder dar commit/push no main

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline e gerar data.json
        run: python scripts/generate_data_json.py

      - name: Commitar data.json atualizado no main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualiza data.json (painel cartão Bacen)"
          file_pattern: "data.json docs/data.json"
